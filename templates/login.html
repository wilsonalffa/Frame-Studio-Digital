<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Frame Sorocaba — Acesso</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='FastFrame.png') }}">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brown:#1A3051;
  --gold:#B22222;
  --white:#FFFFFF;
  --cream:#F4F7FC;
  --border:#D0D9E8;
  --gray:#6B7A99;
  --error-bg:#FEF0F0;
  --error-color:#B22222;
}
body{
  font-family:'Avenir','Nunito',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.login-card{
  background:var(--white);
  border-radius:16px;
  box-shadow:0 8px 40px rgba(26,48,81,.12);
  padding:48px 40px;
  width:100%;
  max-width:420px;
}
.login-logo{
  text-align:center;
  margin-bottom:32px;
}
.login-logo img{
  width:120px;
  height:auto;
  margin-bottom:16px;
}
.login-logo h1{
  font-size:22px;
  font-weight:800;
  color:var(--brown);
  letter-spacing:1px;
  text-transform:uppercase;
}
.login-logo p{
  font-size:13px;
  color:var(--gray);
  margin-top:4px;
}
.form-group{
  margin-bottom:18px;
}
.form-group label{
  display:block;
  font-size:11px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--gray);
  margin-bottom:8px;
}
.form-group input{
  width:100%;
  padding:13px 16px;
  border:1.5px solid var(--border);
  border-radius:8px;
  font-family:'Avenir','Nunito',sans-serif;
  font-size:15px;
  color:var(--brown);
  background:var(--cream);
  outline:none;
  transition:border-color .2s, background .2s;
}
.form-group input:focus{
  border-color:var(--brown);
  background:var(--white);
  box-shadow:0 0 0 3px rgba(26,48,81,.08);
}
.error-msg{
  background:var(--error-bg);
  border:1px solid #F5C6C6;
  border-radius:8px;
  padding:12px 16px;
  font-size:13px;
  color:var(--error-color);
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:8px;
}
.btn-login{
  width:100%;
  padding:14px;
  background:var(--brown);
  color:var(--white);
  border:none;
  border-radius:8px;
  font-family:'Avenir','Nunito',sans-serif;
  font-size:13px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .2s;
  margin-top:8px;
}
.btn-login:hover{
  background:#243F6A;
  box-shadow:0 4px 16px rgba(26,48,81,.25);
  transform:translateY(-1px);
}
.btn-login:active{transform:translateY(0)}
.login-footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;
  color:var(--gray);
}
@media(max-width:480px){
  .login-card{padding:32px 24px}
}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <img src="{{ url_for('static', filename='FastFrame.png') }}" alt="Fast Frame Logo">
    <h1>Frame Studio</h1>
    <p>Ferramenta de Impressão Profissional</p>
  </div>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
    <div class="form-group">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" placeholder="Digite seu usuário"
        autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="Digite sua senha"
        autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Entrar</button>
  </form>
  <div class="login-footer">Área restrita · Fast Frame Sorocaba</div>
</div>
</body>
</html>
